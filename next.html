<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Design Selection</title>
<style>
/* ---------- Global Theme Gradient ---------- */
body {
    font-family: "Century Gothic", Arial, sans-serif;
    font-weight: 400;
    font-size: 20px;
    line-height: 1.45;
    letter-spacing: 0.2px;
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    background: linear-gradient(135deg,#FFDEE9,#B5FFFC,#FFF6B7,#FFB3BA);
    background-size: 800% 800%;
    animation: gradientAnim 20s ease infinite;
    position: relative;
    overflow: hidden;
}
@keyframes gradientAnim {
    0% { background-position: 0% 50%; }
    25% { background-position: 50% 100%; }
    50% { background-position: 100% 50%; }
    75% { background-position: 50% 0%; }
    100% { background-position: 0% 50%; }
}

/* ---------- Buttons Theme (soft pastel) ---------- */
    .return-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        position: fixed;
        top: 18px;
        left: 18px;
        width: 96px;
        height: 96px;
        background: #FF8DA1; /* softer pink */
        color: white;
        font-size: 44px;
        text-decoration: none;
        border-radius: 28px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.28);
        transition: transform 0.22s ease, background 0.22s;
        z-index: 10;
        border: 3px solid rgba(255,255,255,0.12);
    }
    .return-btn:hover {
        background: #FF6B8A;
        transform: scale(1.06);
    }

    .trace-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        position: fixed;
        top: 18px;
        right: 18px;
        width: 96px;
        height: 96px;
        background: #7ED9F7; /* soft sky blue */
        color: white;
        font-size: 22px;
        font-weight: bold;
        text-decoration: none;
        border-radius: 28px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.28);
        transition: transform 0.22s ease, background 0.22s;
        z-index: 10;
        border: 3px solid rgba(255,255,255,0.12);
    }
    .trace-btn i { font-size: 32px; }
    .trace-btn:hover {
        background: #56C7EE;
        transform: scale(1.06);
    }

    .about-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        position: fixed;
        bottom: 20px;
        right: 20px;
        width: 150px;
        height: 72px;
        background: #A98BFF; /* soft lilac */
        color: white;
        font-size: 20px;
        font-weight: bold;
        text-decoration: none;
        border-radius: 28px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.28);
        transition: transform 0.22s ease, background 0.22s;
        z-index: 10;
        border: 3px solid rgba(255,255,255,0.12);
    }
    .about-btn:hover {
        background: #8F6DFF;
        transform: scale(1.06);
    }

/* ---------- Grid Container ---------- */
.grid-container {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 40px;
    padding: 150px 20px 90px;
    width: 90%;
    max-width: 900px;
    margin: 0 auto;
}

/* Center bottom option */
.grid-container a.square3 {
    grid-column: 1 / -1;
    justify-self: center;
    width: 100%;
    max-width: 400px;
}

/* ---------- Squares Theme ---------- */
.square {
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    color: white;
    font-weight: 700;
    text-align: center;
    border-radius: 20px;
    box-shadow: 0 8px 22px rgba(0,0,0,0.18);
    transition: transform 0.28s cubic-bezier(.2,.9,.2,1), filter 0.28s, box-shadow 0.28s;
    padding: 22px 28px;
    min-width: 400px;
    cursor: pointer;
    border: 1px solid rgba(255,255,255,0.12);
    backdrop-filter: blur(4px);
    font-family: "Century Gothic", Arial, sans-serif;
    color: #ffffff;
    text-shadow: 0 2px 6px rgba(0,0,0,0.4);
}

.square.large { 
    font-size: 2.4rem; 
    min-height: 180px; 
}

/* Soft Pastel Card Colors */
.square1 { background: linear-gradient(135deg,#FF9AB8,#FF6B95); }
.square2 { background: linear-gradient(135deg,#FFE07D,#FFC65C); }
.square3 { background: linear-gradient(135deg,#8EE6A4,#56C76F); }

.square:hover {
    transform: translateY(-8px) scale(1.02);
    filter: brightness(1.06) saturate(1.03);
    box-shadow: 0 20px 40px rgba(0,0,0,0.18);
}

.square:focus {
    outline: 4px solid rgba(255,255,255,0.95);
    outline-offset: 6px;
    box-shadow: 0 0 0 5px rgba(0,0,0,0.12);
}

/* ---------- Floating Icons Pastel ---------- */
.floating-icon {
    position: absolute;
    font-size: 2.3em;
    color: rgba(255,255,255,0.9);
    pointer-events: none;
    animation: floatIcon linear infinite;
    filter: drop-shadow(0 3px 4px rgba(0,0,0,0.15));
}

@keyframes floatIcon {
    0% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-18px) rotate(160deg); }
    100% { transform: translateY(0) rotate(360deg); }
}

/* ---------- Screen Reader Only ---------- */
.sr-only {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0,0,0,0);
    white-space: nowrap;
    border: 0;
}

/* ---------- Responsive ---------- */
@media(max-width:768px){
    .grid-container {
        grid-template-columns: 1fr;
        gap: 30px;
    }
    .square.large {
        min-height: 150px; 
        font-size:28px; 
        min-width: auto; 
        width: 100%;
    }
    .return-btn, .trace-btn {
        width:86px;
        height:86px;
        font-size:36px;
    }
    .about-btn {
        width:130px;
        height:60px;
        font-size:18px;
    }
}
/* Game button (top-left, same sizing as trace button) */
.game-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    position: fixed;
    top: 18px;
    left: 18px;
    width: 96px;
    height: 96px;
    background: #FFD166; /* soft game accent */
    color: white;
    font-size: 22px;
    font-weight: bold;
    text-decoration: none;
    border-radius: 28px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.28);
    transition: transform 0.22s ease, background 0.22s;
    z-index: 10;
    border: 3px solid rgba(255,255,255,0.12);
}
.game-btn i { font-size: 32px; }
.game-btn:hover {
    background: #FFC44A;
    transform: scale(1.06);
}

@media(max-width:480px){
    .game-btn { left: 8px; width:86px; height:86px; font-size:18px; }
}

/* site guide removed */
</style>
