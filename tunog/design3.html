<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tunog - Alphabet Slider</title>

<style>
/* --------- Body and background --------- */
body {
    font-family: "Century Gothic", Arial, sans-serif;
    margin: 0;
    min-height: 100vh;
    background: linear-gradient(135deg, #FFDEE9, #B5FFFC, #FFF6B7, #FFB3BA);
    background-size: 800% 800%;
    animation: gradientAnim 20s ease infinite;
    overflow: hidden;
}

@keyframes gradientAnim {
    0% { background-position: 0% 50%; }
    25% { background-position: 50% 100%; }
    50% { background-position: 100% 50%; }
    75% { background-position: 50% 0%; }
    100% { background-position: 0% 50%; }
}

/* --------- Header (Accessible, larger targets for kids) --------- */
header.header-nav {
    width: 100%;
    background: transparent; /* match next.html palette (show gradient behind) */
    display: flex;
    gap: 0.8rem;
    align-items: center;
    padding: 0.9rem 1rem;
    position: sticky;
    top: 0;
    z-index: 1000;
}

/* Fixed pastel return button to match next.html / titik header */
.return-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    position: fixed;
    top: 18px;
    left: 18px;
    width: 96px;
    height: 96px;
    background: #FF8DA1; /* softer pink */
    color: white;
    font-size: 44px;
    text-decoration: none;
    border-radius: 28px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.28);
    transition: transform 0.22s ease, background 0.22s;
    z-index: 1100;
    border: 3px solid rgba(255,255,255,0.12);
}
.return-btn:hover { background: #FF6B8A; transform: scale(1.06); }

.header-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    padding: 0.9rem 1.4rem;
    border: none;
    border-radius: 14px;
    font-size: 1.15rem;
    font-weight: 800;
    font-family: "Century Gothic", Arial, sans-serif;
    color: #ffffff;
    background-color: #FF6B6B;
    cursor: pointer;
    box-shadow: 0 8px 18px rgba(0,0,0,0.18);
    transition: transform 0.18s ease, box-shadow 0.18s, background-color 0.18s;
}

.header-btn--secondary { background-color: #56C7EE; }
.header-btn--tertiary { background-color: #8F6DFF; }

.header-btn:hover {
    transform: translateY(-4px) scale(1.02);
    box-shadow: 0 14px 28px rgba(0,0,0,0.18);
}

/* showAll button: match vibrant gradient from titik */
#showAllBtn {
    background: linear-gradient(135deg,#FF9F80 0%, #56C7EE 50%, #39AFFF 100%);
    color: #fff;
    box-shadow: 0 12px 28px rgba(9,117,180,0.22);
    border: none;
    padding: 0.9rem 1.2rem;
    border-radius: 14px;
}
#showAllBtn:hover {
    background: linear-gradient(135deg,#ffd3b0 0%, #4bb8f0 50%, #2fa8f8 100%);
}
#showAllBtn:active, #showAllBtn:focus {
    background: linear-gradient(135deg,#ffbfa0 0%, #1277cc 50%, #0b67b3 100%);
    transform: translateY(1px) scale(0.98);
    box-shadow: 0 8px 20px rgba(7,90,140,0.28);
}
.all-grid-overlay { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; z-index: 1200; padding: 20px; background: linear-gradient(135deg, rgba(255,222,233,0.92), rgba(181,255,252,0.88)); backdrop-filter: blur(6px); }
.all-grid-overlay.open { display:flex; }
.all-grid { background: linear-gradient(180deg, rgba(255,255,255,0.95), rgba(248,251,255,0.96)); border-radius: 14px; padding: 22px; max-width: 1100px; width: 90vw; max-height: 82vh; overflow: auto; box-shadow: 0 24px 60px rgba(2,6,23,0.28); display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 14px; }

@media(min-width:1200px){
    .all-grid { width: 70vw; max-width: 1200px; }
    .letter-tile { padding: 16px 18px; gap:18px; }
    .letter-tile .big { font-size: 42px; }
    .letter-tile .small { font-size: 24px; }
}

/* single return button style (high contrast on dark header) */
.header-btn--return {
    /* pastel rounded return button matching next.html */
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 96px;
    height: 96px;
    background: #FF8DA1;
    color: #ffffff;
    font-size: 44px;
    border-radius: 28px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.28);
    transition: transform 0.22s ease, background 0.22s;
    border: 3px solid rgba(255,255,255,0.12);
}
.header-btn--return:hover { background: #FF6B8A; transform: scale(1.06); }

/* style overlay back button arrow */
#back-btn { background:#FF8DA1; color:#fff; border:none; padding:10px 12px; border-radius:10px; font-size:18px; }
#back-btn:hover { transform:translateY(-2px); box-shadow:0 8px 18px rgba(0,0,0,0.12); }

.header-btn:active { transform: translateY(-1px) scale(0.99); }

.header-btn:focus-visible {
    outline: 4px solid rgba(0,48,80,0.95);
    outline-offset: 4px;
}

/* --------- Slider Container --------- */
.main-content {
    width: 100%;
    height: calc(100vh - 6vw);
    overflow: hidden;
    position: relative;
}

#slider-container {
    display: flex;
    height: 100%;
    transition: transform 0.4s ease;
}

.slide {
    min-width: 100%;
    height: 100%;
    display: flex;
}

.slide-left {
    width: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    padding-left: 2vw;
    box-sizing: border-box;
}

.slide-right {
    width: 50%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    background: rgba(255,255,255,0.1);
}

/* --------- Letter Box --------- */
.letter-box {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background-color: rgba(255,255,255,0.85);
    box-shadow: 0 0.8vw 2vw rgba(0,0,0,0.3);
    border-radius: 2vw;
    padding: 4vw;
    transition: all 0.3s ease;
}

/* --------- Letter Title --------- */
.letter-title {
    font-family: "Century Gothic", Arial, sans-serif;
    font-size: 2.8vw;
    font-weight: bold;
    color: rgb(187, 224, 252);
    background: linear-gradient(135deg, #FF9F80, #FF6B6B, #FFD93D);
    padding: 0.6vw 2vw;
    border-radius: 2vw;
    box-shadow: 0 0.5vw 1vw rgba(0,0,0,0.25);
    margin-bottom: 1.2vw;
    text-align: center;
    letter-spacing: 0.25vw;
}

/* --------- Letter --------- */
.letter-box .letter {
    font-size: 10vw;
    font-weight: bold;
    color: #FF6B6B;
    cursor: pointer;
    transition: all 0.3s ease;
    border: 0.6vw solid #FF6B6B;
    padding: 1.5vw 3vw;
    border-radius: 1vw;
    background-color: white;
}

.letter-box .letter:hover { 
    transform: scale(1.2); 
}

/* --------- Side Image --------- */
.slide-right .side-image {
    max-width: 90%;
    max-height: 90%;
    border-radius: 1vw;
    box-shadow: 0 0.5vw 1vw rgba(0,0,0,0.3);
}

/* --------- Navigation Arrows --------- */
.arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    font-size: 4vw;
    color: rgba(255,255,255,0.5);
    background: rgba(0,0,0,0.15);
    border-radius: 50%;
    width: 6vw; height: 6vw;
    text-align: center;
    line-height: 6vw;
    cursor: pointer;
    user-select: none;
    z-index: 5;
    transition: background 0.3s, transform 0.2s;
}

.arrow:hover { 
    background: rgba(0,0,0,0.25); 
    transform: translateY(-50%) scale(1.1); 
}

.arrow-left { left: 1vw; }
.arrow-right { right: 1vw; }

/* --------- Overlay --------- */
#overlay {
    position: fixed;
    top: 0; left:0;
    width:100%; height:100%;
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index:9999;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-color: #7fffd4;
}

/* Overlay plain playing/open state */
#overlay.openPlain, #overlay.playing {
    background-image: none !important;
    background-color: #7fffd4; /* aquamarine*/
    transition: background-color 0.25s ease;
}

#overlay.playing .letter-large { filter: drop-shadow(0 8px 24px rgba(0,0,0,0.5)); }

/* overlay side image removed — leave slide side image untouched */

#overlay .letter-large {
    font-size: 25vw;               
    color:white;                   
    font-weight:bold;
    margin-bottom:3vh;
    z-index:3;
    text-shadow: none;
}

#overlay button {
    padding: 1vw 2vw;
    margin: 1vw;
    font-size: 1.5vw;
    border:none;
    border-radius:1vw;
    cursor:pointer;
    background-color:#FF9F80;
    color:white;
    transition: background-color 0.3s;
    z-index:3;
}

#overlay button:hover { background-color:#FF6B6B; }

/* All-letters overlay for titik */
.all-grid-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; display: none; align-items: center; justify-content: center; z-index: 1200; padding: 12px; background: linear-gradient(135deg, rgba(255,222,233,0.92), rgba(181,255,252,0.88)); backdrop-filter: blur(6px); }
.all-grid-overlay.open { display:flex; }
.all-grid { background: linear-gradient(180deg, rgba(255,255,255,0.95), rgba(248,251,255,0.96)); border-radius: 14px; padding: 22px; width: 90vw; max-width: 1100px; max-height: 82vh; overflow: auto; box-shadow: 0 24px 60px rgba(2,6,23,0.28); display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; }
.letter-tile { background: #fff; border-radius: 10px; padding: 12px 14px; display:flex; flex-direction: row; align-items: center; justify-content: flex-start; gap:12px; cursor: pointer; border: 3px solid rgba(0,0,0,0.06); transition: transform 0.12s ease, box-shadow 0.12s ease; }
.letter-tile:hover { transform: translateY(-6px); box-shadow: 0 10px 30px rgba(0,0,0,0.12); }
.letter-tile .big { font-size: 38px; font-weight: 800; }
.letter-tile .small { font-size: 22px; opacity: 0.95; margin-left: 8px; }
.all-overlay-top { width:100%; display:flex; justify-content:flex-end; margin-bottom:8px; }
.back-button { margin-left: 8px; }

/* showAll button: match vibrant gradient from tunog */
#showAllBtn {
    background: linear-gradient(135deg,#FF9F80 0%, #56C7EE 50%, #39AFFF 100%);
    color: #fff;
    box-shadow: 0 12px 28px rgba(9,117,180,0.22);
    border: none;
    padding: 0.9rem 1.2rem;
    border-radius: 14px;
}
#showAllBtn:hover {
    background: linear-gradient(135deg,#ffd3b0 0%, #4bb8f0 50%, #2fa8f8 100%);
}
#showAllBtn:active, #showAllBtn:focus {
    background: linear-gradient(135deg,#ffbfa0 0%, #1277cc 50%, #0b67b3 100%);
    transform: translateY(1px) scale(0.98);
    box-shadow: 0 8px 20px rgba(7,90,140,0.28);
}

@media(min-width:1200px){
    .all-grid { width: 70vw; max-width: 1200px; }
    .letter-tile { padding: 16px 18px; gap:18px; }
    .letter-tile .big { font-size: 42px; }
    .letter-tile .small { font-size: 24px; }
}
</style>
</head>
<body>

<!-- Return button fixed to match site palette (matches titik header) -->
<a href="../next.html" class="return-btn" aria-label="Return to Selection">🏠</a>
<button id="showAllBtn" class="header-btn header-btn--secondary" style="position:fixed; top:18px; right:18px; z-index:1100;">All</button>

<div class="main-content">
    <div id="slider-container"></div>
    <div class="arrow arrow-left">&#10094;</div>
    <div class="arrow arrow-right">&#10095;</div>
</div>

<div id="overlay">
    <div class="letter-large" id="large-letter"></div>
    <button id="play-sound">🔊 Play Sound</button>
    <button id="back-btn" aria-label="Back">⬅</button>
</div>

<script>
// Alphabet including Ñ and Ng (Filipino additions)
const letters = [
    "A","B","C","D","E","F","G","H","I","J","K","L","M",
    "N","Ñ","Ng","O","P","Q","R","S","T","U","V","W","X","Y","Z"
];
const slidesData = letters.map(letter => {
    const lower = letter.toLowerCase();
    const pair = `${letter}${lower}`;
    return { letter: pair, sound: lower, sideImg: `${pair}.png` };
});

const sliderContainer = document.getElementById("slider-container");

/* Generate audio elements dynamically for the full alphabet */
const audioContainer = document.createElement("div");
audioContainer.style.display = "none";
letters.forEach(letter => {
    const audio = document.createElement("audio");
    audio.id = `audio-${letter.toLowerCase()}`;
    // use normalized lowercase filenames
    const key = letter.toLowerCase();
    const filenameMap = { 'ng': 'ng.mp3', 'ñ': 'ntilde.mp3' };
    audio.src = filenameMap[key] || `${key}.mp3`;
    audioContainer.appendChild(audio);
});
document.body.appendChild(audioContainer);
const overlay = document.getElementById("overlay");
const largeLetter = document.getElementById("large-letter");
const playBtn = document.getElementById("play-sound");
const backBtn = document.getElementById("back-btn");
let currentIndex = 0;
let currentAudio = null;

/* Render slides */
slidesData.forEach((slideData, idx) => {
    const slide = document.createElement("div");
    slide.classList.add("slide");
    slide.innerHTML = `
        <div class="slide-left">
            <div class="letter-box">
                <div class="letter-title">TUNOG</div>
                <div class="letter">${slideData.letter}</div>
            </div>
        </div>
        <div class="slide-right">
            <img class="side-image" src="${slideData.sideImg}">
        </div>
    `;
    slide.querySelector(".letter").onclick = () => openOverlay(idx);
    sliderContainer.appendChild(slide);
});

/* Show slide */
function showSlide(idx){
    const offset = -idx * 100;
    sliderContainer.style.transform = `translateX(${offset}%)`;
    currentIndex = idx;
}

/* Overlay */
function openOverlay(idx){
    const data = slidesData[idx];
    currentAudio = document.getElementById("audio-" + data.sound);
    if(window.clearPlaying) window.clearPlaying();
    largeLetter.textContent = data.letter;
    // Keep overlay plain and leave the slide side image untouched
    overlay.style.backgroundImage = 'none';
    overlay.classList.add('openPlain');
    overlay.style.display = "flex";
}

/* Overlay controls */
playBtn.onclick = () => {
    if (!currentAudio) return;
    if (currentAudio.paused) {
        currentAudio.currentTime = 0;
        currentAudio.play().then(() => {
            overlay.classList.add('playing');
            playBtn.textContent = '⏸ Pause';
            if(window.setCurrentlyPlaying) window.setCurrentlyPlaying(currentAudio);
        }).catch(() => {});
        const clear = () => {
            overlay.classList.remove('playing');
            playBtn.textContent = '🔊 Play Sound';
            if(window.clearPlaying) window.clearPlaying();
        };
        currentAudio.addEventListener('ended', clear, { once: true });
        currentAudio.addEventListener('pause', clear, { once: true });
    } else {
        currentAudio.pause();
        overlay.classList.remove('playing');
        playBtn.textContent = '🔊 Play Sound';
    }
};
backBtn.onclick = () => {
    overlay.style.display = "none";
};

/* Arrows */
document.querySelector(".arrow-left").onclick = () => { showSlide((currentIndex-1+slidesData.length)%slidesData.length); };
document.querySelector(".arrow-right").onclick = () => { showSlide((currentIndex+1)%slidesData.length); };

/* Keyboard navigation */
document.addEventListener("keydown", e => {
    if(e.key==="ArrowLeft") document.querySelector(".arrow-left").click();
    if(e.key==="ArrowRight") document.querySelector(".arrow-right").click();
});

/* Show first slide */
showSlide(0);

/* All-letters overlay handlers */
const allGridOverlay = document.createElement('div');
allGridOverlay.className = 'all-grid-overlay';
allGridOverlay.id = 'allGridOverlay';
allGridOverlay.setAttribute('aria-hidden','true');
allGridOverlay.innerHTML = `
    <div style="width:100%;max-width:1200px;">
        <div class="all-overlay-top" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
            <div><button id="allBackBtn" class="header-btn">Back</button></div>
            <div><button id="allAaBtn" class="header-btn header-btn--tertiary">Aa</button></div>
        </div>
            <div class="all-grid" id="allGrid"></div>
    </div>
`;
document.body.appendChild(allGridOverlay);

let allShowUpper = true;

function entryParts(entry){
    if(!entry) return {big:'', small:''};
    if(entry.length===4) return { big: entry.slice(0,2), small: entry.slice(2) };
    return { big: entry[0], small: entry[1] };
}

function populateAllGrid(){
    const grid = document.getElementById('allGrid');
    grid.innerHTML = '';
    slidesData.forEach((data, idx)=>{
        const pair = data.letter || '';
        let big, small;
        if(pair.length===4){ big = pair.slice(0,2); small = pair.slice(2); }
        else { big = pair.charAt(0) || ''; small = pair.charAt(1) || ''; }

        const tile = document.createElement('div');
        tile.className = 'letter-tile';
        tile.setAttribute('data-idx', idx);
        const hue = Math.round((idx / slidesData.length) * 330);
        const bg = `hsl(${hue}deg 70% 92%)`;
        const fg = `hsl(${hue}deg 70% 28%)`;
        tile.style.background = bg;
        tile.style.color = fg;
        const displayBig = allShowUpper ? big : small;
        const displaySmall = allShowUpper ? small : big;
        tile.innerHTML = `<div class="big">${displayBig}</div><div class="small">${displaySmall}</div>`;
        // use the tile color for a visible border
        tile.style.border = `3px solid ${fg}`;
        tile.addEventListener('click', ()=>{
            showSlide(idx);
            hideAllGrid();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });
        grid.appendChild(tile);
    });
}

function showAllGrid(){ populateAllGrid(); allGridOverlay.classList.add('open'); allGridOverlay.setAttribute('aria-hidden','false'); }
function hideAllGrid(){ allGridOverlay.classList.remove('open'); allGridOverlay.setAttribute('aria-hidden','true'); }

document.getElementById('showAllBtn').addEventListener('click', showAllGrid);
document.getElementById('allBackBtn').addEventListener('click', hideAllGrid);
document.getElementById('allAaBtn').addEventListener('click', ()=>{
    allShowUpper = !allShowUpper;
    const aaBtn = document.getElementById('allAaBtn');
    aaBtn.textContent = allShowUpper ? 'Aa' : 'aa';
    // update visible tiles if open
    const tiles = document.querySelectorAll('#allGrid .letter-tile');
    tiles.forEach(tile=>{
        const idx = tile.getAttribute('data-idx');
        const data = slidesData[parseInt(idx,10)];
        const pair = data.letter || '';
        let big, small;
        if(pair.length===4){ big = pair.slice(0,2); small = pair.slice(2); }
        else { big = pair.charAt(0) || ''; small = pair.charAt(1) || ''; }
        const displayBig = allShowUpper ? big : small;
        const displaySmall = allShowUpper ? small : big;
        const bigEl = tile.querySelector('.big');
        const smallEl = tile.querySelector('.small');
        if(bigEl) bigEl.textContent = displayBig;
        if(smallEl) smallEl.textContent = displaySmall;
    });
});
</script>
</body>
</html>
