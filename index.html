<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Index Page</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
<!-- Font Awesome for icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
  /* Gradient background */
  body {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    font-family: 'Fredoka One', Arial, sans-serif;
    background: linear-gradient(135deg, #a8edea, #fed6e3, #fbc2eb);
    background-size: 400% 400%;
    animation: gradientAnimation 15s ease infinite;
    position: relative;
    overflow: hidden;
  }

  @keyframes gradientAnimation {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  /* Floating icons */
  .icon {
    position: absolute;
    font-size: 2.5em;
    color: rgba(255,255,255,0.8);
    pointer-events: none;
    animation: float 10s infinite linear;
  }

  @keyframes float {
    0% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-20px) rotate(180deg); }
    100% { transform: translateY(0) rotate(360deg); }
  }

  /* Extra floating elements (circles) */
  .bubble {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,0.3);
    animation: bubbleFloat 15s infinite linear;
  }

  @keyframes bubbleFloat {
    0% { transform: translateY(0) scale(1); opacity: 0.5; }
    50% { transform: translateY(-100px) scale(1.2); opacity: 1; }
    100% { transform: translateY(0) scale(1); opacity: 0.5; }
  }

  /* Individual icon positions */
  .icon1 { top: 10%; left: 5%; }
  .icon2 { top: 70%; left: 10%; }
  .icon3 { top: 20%; right: 5%; }
  .icon4 { bottom: 15%; right: 10%; }
  .icon5 { top: 50%; left: 50%; font-size: 3em; color: rgba(255,255,255,0.6); }
  .icon6 { top: 30%; right: 40%; font-size: 2em; color: rgba(255,255,255,0.7); }
  .icon7 { bottom: 40%; left: 20%; font-size: 2.2em; color: rgba(255,255,255,0.5); }

  /* Main button */
  a#alpabeto {
    text-decoration: none;
    font-size: 3em;
    color: #4B0082; /* Dark purple for visibility */
    padding: 25px 60px;
    border: 3px solid #fff;
    border-radius: 20px;
    transition: all 0.3s ease;
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    background-color: rgba(255,255,255,0.2);
    backdrop-filter: blur(5px);
    z-index: 10;
    text-shadow: 2px 2px 5px rgba(0,0,0,0.3);
  }

  a#alpabeto:hover {
    background-color: rgba(255,255,255,0.35);
    transform: scale(1.15) rotate(3deg);
    box-shadow: 0 12px 25px rgba(0,0,0,0.5);
  }

  /* Footer styling */
  footer {
    position: fixed;
    bottom: 20px;
    width: 100%;
    display: flex;
    justify-content: space-around;
    pointer-events: auto;
  }

  footer button {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    border: 2px solid #fff;
    background-color: rgba(255,255,255,0.2);
    cursor: pointer;
    transition: all 0.3s ease;
  }

  footer button:hover {
    background-color: rgba(255,255,255,0.5);
    transform: scale(1.2);
  }

</style>
</head>
<body>

<!-- Floating icons -->
<i class="fas fa-leaf icon icon1"></i>
<i class="fas fa-dove icon icon2"></i>
<i class="fas fa-paw icon icon3"></i>
<i class="fas fa-seedling icon icon4"></i>
<i class="fas fa-feather icon icon5"></i>
<i class="fas fa-star icon icon6"></i>
<i class="fas fa-heart icon icon7"></i>

<!-- Floating bubbles -->
<div class="bubble" style="width: 15px; height: 15px; left: 20%; top: 80%; animation-duration: 12s;"></div>
<div class="bubble" style="width: 20px; height: 20px; left: 50%; top: 90%; animation-duration: 18s;"></div>
<div class="bubble" style="width: 10px; height: 10px; left: 70%; top: 60%; animation-duration: 10s;"></div>
<div class="bubble" style="width: 25px; height: 25px; left: 80%; top: 70%; animation-duration: 22s;"></div>
<div class="bubble" style="width: 18px; height: 18px; left: 35%; top: 50%; animation-duration: 16s;"></div>

<!-- Main Button -->
<a href="next.html" id="alpabeto">ALPABETO</a>

<!-- Footer with 5 buttons (no text) -->
<footer id="footer">
  <button data-index="1"></button>
  <button data-index="2"></button>
  <button data-index="3"></button>
  <button data-index="4"></button>
  <button data-index="5"></button>
</footer>

<script>
  // Sequence for Roblox Easter egg: 2 → 4 → 3 → 1 → 5
  const sequence = [2,4,3,1,5];
  let userInput = [];

  const footerButtons = document.querySelectorAll('footer button');

  footerButtons.forEach(button => {
    button.addEventListener('click', () => {
      const index = parseInt(button.dataset.index);
      userInput.push(index);

      // Check current input against sequence
      for (let i = 0; i < userInput.length; i++) {
        if (userInput[i] !== sequence[i]) {
          userInput = []; // reset if wrong
          return;
        }
      }

      // Check if sequence completed
      if (userInput.length === sequence.length) {
        // Hide footer buttons
        document.getElementById('footer').style.display = 'none';
        // Redirect to Roblox
        window.location.href = "https://www.roblox.com";
      }
    });
  });
</script>

</body>
</html>
