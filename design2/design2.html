<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Titik Matching Game</title>
<style>
/* ---------- Gradient Background ---------- */
body {
    font-family: Arial, sans-serif;
    margin: 0;
    min-height: 100vh;
    background: linear-gradient(135deg, #FFDEE9, #B5FFFC, #FFF6B7, #FFB3BA);
    background-size: 800% 800%;
    animation: gradientAnim 20s ease infinite;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    overflow: hidden; 
}
@keyframes gradientAnim {
    0% { background-position: 0% 50%; }
    25% { background-position: 50% 100%; }
    50% { background-position: 100% 50%; }
    75% { background-position: 50% 0%; }
    100% { background-position: 0% 50%; }
}

/* ---------- Header ---------- */
header {
    width: 100%;
    background: linear-gradient(to right, #FFB3BA, #FFF6B7);
    display: flex;
    justify-content: flex-start;
    align-items: center;
    padding: 15px 25px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    position: sticky;
    top: 0;
    z-index: 1000;
}
header button {
    margin-right: 15px;
    padding: 14px 28px;
    border: none;
    border-radius: 12px;
    font-size: 18px;
    font-weight: bold;
    color: #FF6B6B;
    cursor: pointer;
    background-color: #FFE5D9;
    transition: background-color 0.3s, transform 0.2s;
}
header button:hover {
    background-color: #FFD6AA;
    transform: scale(1.05);
}

/* ---------- Main Content ---------- */
.main {
    flex: 1;
    width: 100%;
    max-width: 1200px;
    padding: 40px 20px;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

/* Single menu box centered */
.menu-wrapper {
    display: flex;
    justify-content: center;
    margin-bottom: 30px;
}

.menu-box {
    width: 300px;
    padding: 30px;
    background: white;
    border-radius: 25px;
    font-size: 28px;
    font-weight: bold;
    cursor: pointer;
    text-align: center;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    transition: 0.3s;
}
.menu-box:hover {
    transform: scale(1.05);
    background: #FFE8D6;
}

/* Game Container */
.game-container {
    width: 100%;
    max-width: 1000px;
    padding: 25px;
    background: white;
    border-radius: 25px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}

.letters {
    display: flex;
    justify-content: space-evenly;
    flex-wrap: nowrap;
    margin-top: 25px;
    gap: 25px; /* Added spacing between letters */
}

/* Buttons */
.letter-btn, .match {
    padding: 20px;
    border-radius: 18px;
    font-size: 40px;
    cursor: pointer;
    width: 120px;
    text-align: center;
    transition: 0.2s;
    user-select: none;
}

.letter-btn {
    background: #FFF2CC;
}
.letter-btn:hover {
    transform: scale(1.2);
    background: #FFD580;
}

.match {
    background: #CCE5FF;
}
.match:hover {
    transform: scale(1.2);
    background: #A7D3FF;
}

/* Highlight pressed */
.selected-cap {
    background: #6DFF70 !important;
    transform: scale(1.2);
}
.selected-small {
    background: #6DB6FF !important;
    transform: scale(1.2);
}

/* Overlay for completion */
.overlay {
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: linear-gradient(135deg, #FFD6E0, #B3DAFF);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    display: none;
}

.overlay h1 {
    font-size: 100px;
    color: #FF6B6B;
    text-shadow: 3px 3px 10px rgba(0,0,0,0.3);
    margin: 0 0 40px 0;
}

.overlay button {
    margin: 15px;
    padding: 20px 50px;
    font-size: 30px;
    font-weight: bold;
    border-radius: 20px;
    border: none;
    cursor: pointer;
    color: white;
    background: #FF6B6B;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    transition: 0.3s;
}
.overlay button:hover {
    background: #FF8B8B;
}
</style>
</head>

<body>

<!-- Header -->
<header>
    <button onclick="location.href='../index.html'">🏠 Home</button>
    <button onclick="location.href='../next.html'">📚 Selection</button>
    <button onclick="location.href='../about.html'">😊 About Us</button>
</header>

<div class="main">
    <div class="menu-wrapper">
        <div class="menu-box" onclick="showLetters()">Maglaro</div>
    </div>

    <div id="gameArea"></div>
</div>

<!-- Overlay -->
<div class="overlay" id="overlay">
    <h1>MAGALING!</h1>
    6<div>
        <button onclick="showLetters()">Play Again</button>
        <button onclick="location.href='../design2/design2.html'">Return</button>
    </div>
</div>

<script>
/* ---------- GLOBALS ---------- */
let selectedCap = "";
let selectedSmall = "";
let capBtn = null;
let smallBtn = null;
let matchesLeft = 0;

function resetSelections() {
    if (capBtn) capBtn.classList.remove("selected-cap");
    if (smallBtn) smallBtn.classList.remove("selected-small");
    selectedCap = "";
    selectedSmall = "";
    capBtn = null;
    smallBtn = null;
}

/* Shuffle Function */
function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

/* ---------- 8 Letters GAME ---------- */
function showLetters() {
    let letters = ["I","R","H","W","N","L","Y","G"];
    matchesLeft = letters.length;

    let capRand = shuffle([...letters]);
    let smallRand = shuffle(letters.map(l => l.toLowerCase()));

    let html = `
        <div class='game-container'>
            <h2> Piliin ang Naangkop</h2>

            <div class='letters' id='capRow'>
                ${capRand.map(v=>`<div class='letter-btn' onclick="selectCap('${v}', this)">${v}</div>`).join("")}
            </div>

            <div class='letters' id='smallRow'>
                ${smallRand.map(v=>`<div class='match' onclick="selectSmall('${v}', this)">${v}</div>`).join("")}
            </div>

            <p id="result"></p>
        </div>
    `;
    document.getElementById("gameArea").innerHTML = html;
    document.getElementById("overlay").style.display = "none";
    resetSelections();
}

/* ---------- SELECTION FUNCTIONS ---------- */
function selectCap(letter, element){
    if (capBtn) capBtn.classList.remove("selected-cap");
    element.classList.add("selected-cap");
    capBtn = element;
    selectedCap = letter;
    checkMatch();
}

function selectSmall(letter, element){
    if (smallBtn) smallBtn.classList.remove("selected-small");
    element.classList.add("selected-small");
    smallBtn = element;
    selectedSmall = letter;
    checkMatch();
}

function checkMatch(){
    if(selectedCap && selectedSmall){
        if(selectedCap.toLowerCase() === selectedSmall){
            // Correct match → remove letters
            capBtn.style.visibility = "hidden";
            smallBtn.style.visibility = "hidden";
            matchesLeft--;

            resetSelections();

            if(matchesLeft === 0){
                // Show overlay
                document.getElementById("overlay").style.display = "flex";
            }
        } else {
            document.getElementById("result").innerHTML = `❌ Mali! Ulit.`;
            setTimeout(()=>resetSelections(), 600);
        }
    }
}
</script>

</body>
</html>
